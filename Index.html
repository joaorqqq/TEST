<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Download TXT</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background-color: #1e1e1e;
    color: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    margin: 0;
  }

  h1 {
    color: #4caf50;
  }

  button {
    padding: 15px 30px;
    font-size: 18px;
    background-color: #4caf50;
    border: none;
    border-radius: 5px;
    color: #fff;
    cursor: pointer;
  }

  button:hover {
    background-color: #45a049;
  }
</style>
</head>
<body>

<h1>Baixar arquivo TXT</h1>
<button onclick="baixarTXT()">Baixar TXT</button>

<script>
function baixarTXT() {
  const conteudo = "Este é o conteúdo do arquivo TXT."; // conteúdo do TXT
  const blob = new Blob([conteudo], { type: 'text/plain' });
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = 'meuarquivo.txt'; // nome do arquivo
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
}
</script>

</body>
</html>
